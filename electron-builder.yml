appId: com.ftree.app
productName: FTree
directories:
  buildResources: resources
  output: dist-release
files:
  - dist/**/*
  - dist-electron/main/**/*
  - dist-electron/preload/**/*
  - package.json
  - "!dist-electron/src"
  - "!src"
  - "!scripts"
  - "!resources"
  # 排除前端已打包的依赖（Vite 已内联到 dist/assets 中）
  - "!node_modules/antd/**"
  - "!node_modules/@ant-design/**"
  - "!node_modules/react/**"
  - "!node_modules/react-dom/**"
  - "!node_modules/react-router-dom/**"
  - "!node_modules/react-router/**"
  - "!node_modules/@remix-run/**"
  - "!node_modules/d3/**"
  - "!node_modules/d3-*/**"
  - "!node_modules/rc-*/**"
  - "!node_modules/@babel/**"
  - "!node_modules/@rc-component/**"
  - "!node_modules/html-to-image/**"
  - "!node_modules/@emotion/**"
  - "!node_modules/classnames/**"
  - "!node_modules/dayjs/**"
  - "!node_modules/internmap/**"
  - "!node_modules/robust-predicates/**"
  - "!node_modules/delaunator/**"
  - "!node_modules/@ctrl/**"
  - "!node_modules/scheduler/**"
extraResources: []
win:
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: FTree 家谱管理

# macOS 配置
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  category: public.app-category.utilities
  darkModeSupport: true
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
  window:
    width: 540
    height: 380

# Linux 配置
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Utility
  synopsis: 家谱记录与可视化管理软件
  description: FTree 是一款家谱记录与可视化管理软件，支持家谱数据的录入、编辑、查看和导出。
deb:
  depends:
    - gconf2
    - gconf-service
    - libnotify4
    - libappindicator1
    - libxtst6
    - libnss3

asar: true
npmRebuild: false
nodeGypRebuild: false
